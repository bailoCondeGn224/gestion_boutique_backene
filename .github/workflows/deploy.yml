name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo
        uses: appleboy/ssh-action@master
        with:
          host: 161.97.136.168
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cp /opt/gestion-boutique/backend/.env /tmp/backend.env
            cd /opt/gestion-boutique/backend
            git pull origin main
            cp /tmp/backend.env /opt/gestion-boutique/backend/.env
            cd /opt/gestion-boutique
            docker compose build --no-cache backend
            docker compose up -d backend